<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital - Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1a3d5c 0%, #2e86ab 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 450px;
            width: 100%;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .logo { font-size: 32px; color: #1a3d5c; font-weight: bold; margin-bottom: 8px; }
        h1 { color: #2d3748; margin-bottom: 20px; }
        .success-message {
            background: #c6f6d5;
            color: #22543d;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 6px solid #48bb78;
        }
        .btn {
            background: #1a3d5c;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 15px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin-top: 10px;
            transition: all 0.3s;
        }
        .btn:hover { background: #2e86ab; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🏥 HOSPITAL</div>
        <h1>Dashboard</h1>
        <div class="success-message">
            <h2>✅ ¡Sesión iniciada!</h2>
            <p>Bienvenido, <strong>{{ nombre }}</strong></p>
            <p style="font-size:0.9em; margin-top:6px;">{{ email }}</p>
        </div>
        <a href="/cerrar_sesion" class="btn">🚪 Cerrar Sesión</a>
    </div>
</body>
</html>
