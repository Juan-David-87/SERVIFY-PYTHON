<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERVIFY — Recuperar Contraseña</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>

<nav>
    <a class="logo" href="/"><span class="logo-text">SERVIFY</span></a>
    <a href="/login" class="btn-nav btn-nav-accent">Iniciar sesión</a>
</nav>

<main class="main-center">
    <div class="auth-wrapper">
        <div class="auth-card">
            {% if enviado %}
                <div class="success-box">
                    <div class="success-icon">✉</div>
                    <h2>¡Correo enviado!</h2>
                    <p>Enviamos instrucciones a</p>
                    <p><strong>{{ email }}</strong></p>
                    <a href="/login" class="btn btn-accent">Volver al login</a>
                </div>
            {% else %}
                <div class="card-header">
                    <h1>Recuperar contraseña</h1>
                    <p>Te enviaremos instrucciones a tu correo</p>
                </div>
                <form method="POST">
                    <div class="fg">
                        <label for="email">Correo electrónico</label>
                        <input type="email" id="email" name="email" required placeholder="ejemplo@correo.com">
                    </div>
                    <button type="submit" class="btn-submit">Enviar instrucciones</button>
                </form>
                <div class="auth-footer">
                    <a href="/login" class="link-accent">← Volver al inicio de sesión</a>
                    <a href="/" class="link-muted">← Volver al inicio</a>
                </div>
            {% endif %}
        </div>
    </div>
</main>

<footer class="footer">© 2026 SERVIFY — Todos los derechos reservados</footer>

</body>
</html>
