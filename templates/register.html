<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SERVIFY - Registro</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>

<div class="container small">

    <div class="logo">🛠️ SERVIFY</div>
    <h1>Crear Cuenta</h1>

    {% if registrado %}

        <div class="success-message">
            <h2>¡Registro exitoso!</h2>
            <p><strong>{{ nombre }}</strong> te has registrado como <strong>{{ tipo_usuario }}</strong></p>
            <p>Email: {{ email }}</p>
            <p>Modo simulación - datos no almacenados</p>

            <div style="margin-top: 20px;">
                <a href="/login" class="btn" style="width: auto; padding: 10px 20px;">Iniciar Sesión</a>
                <a href="/" class="btn" style="width: auto; padding: 10px 20px; background: #718096;">Volver al Inicio</a>
            </div>
        </div>

    {% else %}

        <form method="POST">

            <div class="form-group">
                <label>Nombre</label>
                <input type="text" name="name" required>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required>
            </div>

            <div class="form-group">
                <label>Teléfono</label>
                <input type="text" name="phone" required>
            </div>

            <div class="form-group">
                <label>Tipo de usuario</label>

                <div class="radio-group">
                    <label>
                        <input type="radio" name="tipo_usuario" value="client" checked>
                        Cliente
                    </label>

                    <label>
                        <input type="radio" name="tipo_usuario" value="worker">
                        Proveedor
                    </label>
                </div>
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <input type="password" name="password" required>
            </div>

            <div class="form-group">
                <label>Confirmar</label>
                <input type="password" name="confirm_password" required>
            </div>

            <button type="submit" class="btn full">Registrarse</button>

        </form>

        <div class="links">
            <a href="/login">Ya tengo cuenta</a>
            <a href="/">Inicio</a>
        </div>

    {% endif %}

</div>

</body>
</html>
